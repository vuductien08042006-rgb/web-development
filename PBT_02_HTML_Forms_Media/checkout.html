<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Checkout Form</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f5f5f5;
        }

        h1{
            text-align: center;
        }

        form{
            background: white;
            padding: 20px;
            border-radius: 10px;
            max-width: 1000px;
            margin: auto;
        }

        fieldset{
            margin-bottom: 25px;
            padding: 20px;
        }

        legend{
            font-weight: bold;
            font-size: 18px;
        }

        label{
            display: block;
            margin-top: 12px;
        }

        input,
        select,
        textarea{
            width: 100%;
            padding: 10px;
            margin-top: 5px;
        }

        table{
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        table,
        th,
        td{
            border: 1px solid #ccc;
        }

        th,
        td{
            padding: 10px;
            text-align: center;
        }

        tfoot{
            font-weight: bold;
            background-color: #eee;
        }

        .radio-group input{
            width: auto;
        }

        .buttons{
            margin-top: 20px;
        }

        button{
            padding: 12px 20px;
            margin-right: 10px;
        }

        meter,
        progress{
            width: 100%;
            height: 25px;
        }

    </style>
</head>

<body>

    <h1>Form Đặt Hàng E-Commerce</h1>

    <form action="#" method="POST">

        <!-- PHẦN 1 -->
        <fieldset>

            <legend>Giỏ hàng</legend>

            <!-- Bonus datalist -->
            <label for="search-product">
                Tìm kiếm sản phẩm
            </label>

            <input
                type="text"
                id="search-product"
                list="products"
                placeholder="Nhập tên sản phẩm"
            >

            <datalist id="products">

                <option value="iPhone 16 Pro Max">
                <option value="Laptop Gaming RTX 4060">
                <option value="Tai nghe Bluetooth">

            </datalist>

            <!-- Table -->
            <table>

                <thead>

                    <tr>

                        <th>STT</th>
                        <th>Sản phẩm</th>
                        <th>Đơn giá</th>
                        <th>Số lượng</th>
                        <th>Thành tiền</th>

                    </tr>

                </thead>

                <tbody>

                    <tr>

                        <td>1</td>
                        <td>iPhone 16 Pro Max</td>
                        <td>25.990.000đ</td>
                        <td>1</td>
                        <td>25.990.000đ</td>

                    </tr>

                    <tr>

                        <td>2</td>
                        <td>Laptop Gaming RTX 4060</td>
                        <td>30.000.000đ</td>
                        <td>1</td>
                        <td>30.000.000đ</td>

                    </tr>

                    <tr>

                        <td>3</td>
                        <td>Tai nghe Bluetooth</td>
                        <td>2.000.000đ</td>
                        <td>2</td>
                        <td>4.000.000đ</td>

                    </tr>

                </tbody>

                <tfoot>

                    <tr>

                        <td colspan="4">
                            Tổng cộng
                        </td>

                        <td>
                            59.990.000đ
                        </td>

                    </tr>

                </tfoot>

            </table>

            <!-- Bonus output -->
            <label for="total">
                Tổng tiền:
            </label>

            <output id="total">
                59.990.000đ
            </output>

        </fieldset>

        <!-- PHẦN 2 -->
        <fieldset>

            <legend>Thanh toán</legend>

            <!-- Radio -->
            <label>
                Phương thức thanh toán
            </label>

            <div class="radio-group">

                <input
                    type="radio"
                    id="cod"
                    name="payment"
                    value="cod"
                    required
                >

                <label for="cod">
                    COD
                </label>

                <input
                    type="radio"
                    id="bank"
                    name="payment"
                    value="bank"
                >

                <label for="bank">
                    Chuyển khoản
                </label>

                <input
                    type="radio"
                    id="wallet"
                    name="payment"
                    value="wallet"
                >

                <label for="wallet">
                    Ví điện tử
                </label>

            </div>

            <!-- Mã giảm giá -->
            <label for="coupon">
                Mã giảm giá
            </label>

            <input
                type="text"
                id="coupon"
                name="coupon"
                placeholder="SALE2026"
                pattern="SALE[0-9]{4}"
                title="Mã phải có dạng SALE + 4 chữ số"
            >

            <!-- Ghi chú -->
            <label for="note">
                Ghi chú
            </label>

            <textarea
                id="note"
                name="note"
                rows="4"
                placeholder="Nhập ghi chú nếu có"
            ></textarea>

        </fieldset>

        <!-- PHẦN 3 -->
        <fieldset>

            <legend>Thông tin giao hàng</legend>

            <!-- Ngày giao -->
            <label for="delivery-date">
                Ngày giao hàng mong muốn
            </label>

            <input
                type="date"
                id="delivery-date"
                name="delivery-date"
                min="2026-05-09"
                required
            >

            <!-- Khung giờ -->
            <label for="time-slot">
                Khung giờ giao hàng
            </label>

            <select
                id="time-slot"
                name="time-slot"
                required
            >

                <option value="">
                    -- Chọn khung giờ --
                </option>

                <option value="morning">
                    Sáng 8-12h
                </option>

                <option value="afternoon">
                    Chiều 14-18h
                </option>

                <option value="evening">
                    Tối 18-21h
                </option>

            </select>

            <!-- Range -->
            <label for="delivery-time">
                Thời gian giao hàng (1-7 ngày)
            </label>

            <input
                type="range"
                id="delivery-time"
                name="delivery-time"
                min="1"
                max="7"
                step="1"
            >

            <!-- Bonus meter -->
            <label for="points">
                Điểm tích lũy
            </label>

            <meter
                id="points"
                min="0"
                max="100"
                value="70"
            >
            </meter>

        </fieldset>

        <!-- Buttons -->
        <div class="buttons">

            <button
                type="submit"
                aria-label="Xác nhận đặt hàng"
            >
                Xác nhận đặt hàng
            </button>

            <button type="reset">
                Xóa form
            </button>

        </div>

    </form>

</body>
</html>
