<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý nhân sự</title>

    <link rel="stylesheet" href="free.css">
</head>

<body>

    <!-- HEADER -->
    <header>
        <div class="left">

            <div class="logo">
                <h1>Quản lý nhân sự</h1>
            </div>

            <nav>
                <ul>
                    <li>
                        <a href="#">Trang chủ</a>
                    </li>

                    <li>
                        <a href="#">Liên hệ</a>
                    </li>
                </ul>
            </nav>

        </div>

        <div class="search">
            <input type="text" placeholder="Tìm kiếm...">
            <span>🔍</span>
        </div>
    </header>


    <!-- CONTENT -->
    <div class="container">

        <div class="top">
            <h2>Danh sách nhân sự</h2>

            <button onclick="openPopup()">
                + Thêm mới
            </button>
        </div>

        <!-- TABLE -->
        <table>

            <thead>
                <tr>
                    <th>STT</th>
                    <th>Họ tên</th>
                    <th>Email</th>
                    <th>Số điện thoại</th>
                    <th>Vị trí</th>
                    <th>Hành động</th>
                </tr>
            </thead>

            <tbody id="tableBody">

                <tr>
                    <td>1</td>
                    <td>Nguyễn Văn A</td>
                    <td>a@gmail.com</td>
                    <td>0987654321</td>
                    <td>Nhân viên</td>

                    <td>
                        <button class="edit">Sửa</button>
                        <button class="delete">Xóa</button>
                    </td>
                </tr>

            </tbody>

        </table>

    </div>


    <!-- POPUP -->
    <div class="popup" id="popup">

        <div class="popup-content">

            <h3>Thêm nhân sự</h3>

            <input type="text" id="name" placeholder="Họ tên">

            <input type="email" id="email" placeholder="Email">

            <input type="text" id="phone" placeholder="Số điện thoại">

            <input type="text" id="position" placeholder="Vị trí">

            <button onclick="addEmployee()" class="save">
                Lưu
            </button>

            <button onclick="closePopup()" class="close">
                Đóng
            </button>

        </div>

    </div>


    <script>

        function openPopup() {
            document.getElementById("popup").style.display = "flex";
        }

        function closePopup() {
            document.getElementById("popup").style.display = "none";
        }

        function addEmployee() {

            let name = document.getElementById("name").value;
            let email = document.getElementById("email").value;
            let phone = document.getElementById("phone").value;
            let position = document.getElementById("position").value;

            let table = document.getElementById("tableBody");

            let rowCount = table.rows.length + 1;

            let row = `
                <tr>
                    <td>${rowCount}</td>
                    <td>${name}</td>
                    <td>${email}</td>
                    <td>${phone}</td>
                    <td>${position}</td>

                    <td>
                        <button class="edit">Sửa</button>
                        <button class="delete">Xóa</button>
                    </td>
                </tr>
            `;

            table.innerHTML += row;

            closePopup();
        }

    </script>

</body>

</html>
